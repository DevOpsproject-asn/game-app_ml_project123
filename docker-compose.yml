"""Docker Compose configuration"""
version: '3.8'

services:
  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: game-ml-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://game_user:game_password@postgres:5432/game_analytics
    depends_on:
      - postgres
      - mlflow
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
    networks:
      - game-ml-network
    command: >
      sh -c "uvicorn src.api.main:app 
      --host 0.0.0.0 
      --port 8000 
      --reload"

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: game-ml-postgres
    environment:
      - POSTGRES_USER=game_user
      - POSTGRES_PASSWORD=game_password
      - POSTGRES_DB=game_analytics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - game-ml-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U game_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MLflow Tracking Server
  mlflow:
    image: python:3.11-slim
    container_name: game-ml-mlflow
    working_dir: /mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    networks:
      - game-ml-network
    command: >
      sh -c "pip install mlflow &&
      mlflow server 
      --backend-store-uri sqlite:////mlflow/mlruns/mlflow.db 
      --default-artifact-root /mlflow/artifacts 
      --host 0.0.0.0"

  # MongoDB (optional)
  mongodb:
    image: mongo:7
    container_name: game-ml-mongodb
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - game-ml-network

volumes:
  postgres_data:
  mlflow_data:
  mongodb_data:

networks:
  game-ml-network:
    driver: bridge
